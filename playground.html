<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal WebMCP Agent - Playground</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; color: #333; }
        form { border: 1px solid #ddd; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"], input[type="email"] { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; height: 350px; overflow-y: auto; font-size: 0.9rem; }
        h1, h2 { color: #111; }
    </style>
</head>
<body>
    <h1>Checkout Playground</h1>
    <p>This is a mock e-commerce checkout form designed to test the <strong>Universal WebMCP Agent Toolkit</strong> locally.</p>

    <!-- Declarative form exposing the WebMCP Tool -->
    <form id="checkoutForm" toolname="checkout_cart" tooldescription="Submit the shopping cart to complete the purchase" toolautosubmit>
        <h2>Shipping & Payment Details</h2>
        
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required toolparamdescription="The full name of the customer for shipping" placeholder="e.g. Jane Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required toolparamdescription="Email address for order confirmation" placeholder="jane@example.com">
        </div>

        <div class="form-group">
            <label for="address">Shipping Address</label>
            <input type="text" id="address" name="address" required toolparamdescription="Complete shipping physical address" placeholder="123 Main St, City, Country">
        </div>
        
        <div class="form-group">
            <label for="creditCard">Credit Card Details</label>
            <input type="text" id="creditCard" name="creditCard" required toolparamdescription="16 digit credit card number, formatted as XXXX-XXXX-XXXX-XXXX" placeholder="1234-5678-9012-3456">
        </div>

        <button type="submit" id="submitBtn">Complete Purchase</button>
    </form>

    <h2>Semantic DOM Sub-Agent View (Observation Phase)</h2>
    <div id="log">Initializing Semantic DOM Indexer...</div>

    <script src="indexer.js"></script>
</body>
</html>
