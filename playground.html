<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal WebMCP Agent - Playground</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            color: #333;
        }

        form {
            border: 1px solid #ddd;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            height: 350px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        #agentUI {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        #taskInput {
            width: 70%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        #runAgentBtn {
            background: #10b981;
            margin-left: 10px;
        }

        #runAgentBtn:hover {
            background: #059669;
        }

        #agentLog {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 6px;
            font-family: monospace;
            height: 250px;
            overflow-y: auto;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .log-error {
            color: #f87171;
        }

        .log-success {
            color: #4ade80;
        }

        .log-action {
            color: #60a5fa;
        }

        .log-warning {
            color: #facc15;
        }

        .log-info {
            color: #94a3b8;
        }

        h1,
        h2 {
            color: #111;
        }
    </style>
</head>

<body>
    <h1>Checkout Playground</h1>
    <p>This is a mock e-commerce checkout form designed to test the <strong>Universal WebMCP Agent Toolkit</strong>
        locally.</p>

    <!-- Agent Control UI -->
    <div id="agentUI">
        <h2>🤖 Test the In-Page Agent</h2>
        <div style="display: flex;">
            <input type="text" id="taskInput"
                placeholder="e.g. Fill out the checkout form for Alice Bob with email alice@test.com">
            <button id="runAgentBtn">Run Agent</button>
        </div>
        <div id="agentLog">Agent logs will appear here...</div>
    </div>

    <!-- Declarative form exposing the WebMCP Tool -->
    <form id="checkoutForm" toolname="checkout_cart" tooldescription="Submit the shopping cart to complete the purchase"
        toolautosubmit>
        <h2>Shipping & Payment Details</h2>

        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required
                toolparamdescription="The full name of the customer for shipping" placeholder="e.g. Jane Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required
                toolparamdescription="Email address for order confirmation" placeholder="jane@example.com">
        </div>

        <div class="form-group">
            <label for="address">Shipping Address</label>
            <input type="text" id="address" name="address" required
                toolparamdescription="Complete shipping physical address" placeholder="123 Main St, City, Country">
        </div>

        <div class="form-group">
            <label for="creditCard">Credit Card Details</label>
            <input type="text" id="creditCard" name="creditCard" required
                toolparamdescription="16 digit credit card number, formatted as XXXX-XXXX-XXXX-XXXX"
                placeholder="1234-5678-9012-3456">
        </div>

        <button type="submit" id="submitBtn">Complete Purchase</button>
    </form>

    <h2>Semantic DOM Sub-Agent View (Observation Phase)</h2>
    <div id="log">Initializing Semantic DOM Indexer...</div>

    <script src="indexer.js"></script>
    <script src="agent.js"></script>
    <script>
        document.getElementById('checkoutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Checkout Form Submitted!");
        });

        document.getElementById('runAgentBtn').addEventListener('click', async () => {
            const task = document.getElementById('taskInput').value;
            if (!task) {
                alert("Please enter a task.");
                return;
            }

            // Make sure the DOM is freshly indexed
            updateLog();

            const agent = new PageAgent(window.AgentIndexer);

            // Clear previous log
            agent.agentLogEl.innerHTML = '';

            const btn = document.getElementById('runAgentBtn');
            btn.disabled = true;
            btn.textContent = "Agent Running...";

            await agent.run(task);

            btn.disabled = false;
            btn.textContent = "Run Agent";
        });
    </script>
</body>

</html>
