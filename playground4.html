<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal WebMCP Agent - Phase 4 (BYOK LLM)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            color: #333;
        }

        form {
            border: 1px solid #ddd;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        select,
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        #webmcp-mock {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            height: 350px;
            overflow-y: auto;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        #agentUI {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        #taskInput {
            width: 70%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .log-error {
            color: #f87171;
        }

        .log-success {
            color: #4ade80;
        }

        .log-action {
            color: #60a5fa;
        }

        .log-warning {
            color: #facc15;
        }

        .log-info {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <h1>BYOK Integration Testing (Phase 4)</h1>
    <p>Testing the <code>OpenAIProvider</code> by bringing your own API Key directly in the browser.</p>

    <!-- Agent Control UI -->
    <div id="agentUI">
        <h2>🌐 Bring Your Own Key Test</h2>
        <div class="form-group">
            <label for="apiKey">OpenAI API Key (sk-...)</label>
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
        </div>
        <div style="display: flex;">
            <input type="text" id="taskInput" placeholder="e.g. Fill the form with name 'Test User'">
            <button id="runAgentBtn">Initialize & Run Agent</button>
        </div>
        <div id="webmcp-mock">Waiting to initialize...</div>
    </div>

    <!-- Declarative form exposing the WebMCP Tool -->
    <form id="checkoutForm" toolname="checkout_cart" tooldescription="Submit the shopping cart to complete the purchase"
        toolautosubmit>
        <h2>Shipping & Payment Details</h2>
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required
                toolparamdescription="The full name of the customer for shipping" placeholder="e.g. Jane Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required
                toolparamdescription="Email address for order confirmation" placeholder="jane@example.com">
        </div>
        <button type="submit" id="submitBtn">Complete Purchase</button>
    </form>

    <script src="packages/core/dist/browser.js"></script>
    <script>
        const logBox = document.getElementById('webmcp-mock');
        function mlog(msg, type = "info") {
            const el = document.createElement('div');
            el.className = `log-${type}`;
            el.innerText = `[Agent Log] ${msg}`;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[Agent Log] ${msg}`);
        }

        const mockClient = {
            requestUserInteraction: async (params) => {
                mlog(`\n--- HUMAN IN THE LOOP TRIGGER ---`, "warning");
                mlog(`Agent requests: "${params.message}"`, "warning");
                await new Promise(r => setTimeout(r, 500));
                const approved = window.confirm(`[WebMCP HITL Request]\n\n${params.message}`);
                mlog(`User response: ${approved ? 'APPROVED' : 'DENIED'}`, approved ? "success" : "error");
                return approved;
            }
        };

        let toolkitInitialized = false;

        async function initToolkit(apiKey) {
            mlog("Setting up the WebMCPToolkit SDK with OpenAIProvider...");
            const { WebMCPToolkit, InPageAgent, OpenAIProvider } = window.UniversalWebMCPAgent;

            const mcp = new WebMCPToolkit({
                logHandler: (msg, level) => mlog(`${msg}`, level)
            });

            const llmProvider = new OpenAIProvider({
                apiKey: apiKey,
                model: "gpt-4o-mini", // fast and cheap
                systemPrompt: "You are a specialized webpage UI automation agent. Your goal is to help the user complete tasks on a web page.\nYou will receive a serialized DOM state and a list of your exact past actions. You must pick exactly ONE tool to execute per turn.\nReturn ONLY valid JSON matching the exact schema requested.\nDo NOT hallucinate UI element IDs. Only use IDs physically present in the observation.\nIf you have already typed into a field, do not type into it again unless the user is asking to correct it!"
            });

            mcp.enableUniversalDelegate({
                agent: new InPageAgent({
                    llmProvider: llmProvider,
                    maxSteps: 10
                }),
                requireConfirmationFor: ["form[toolname='checkout_cart']"]
            });
            mlog("Toolkit setup complete.", "success");
            toolkitInitialized = true;
        }

        // --- END TO END TEST TRIGGER ---
        document.getElementById('runAgentBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value;
            const task = document.getElementById('taskInput').value;

            if (!apiKey) return alert("Please enter an OpenAI API Key.");
            if (!task) return alert("Enter a task.");

            // Expose the mocked modelContext specifically here since we're bypassing standard invocation hooks in playground 4
            window.registeredToolsMap = new Map();
            Object.defineProperty(navigator, 'modelContext', {
                value: {
                    registerTool: (toolDef) => {
                        window.registeredToolsMap.set(toolDef.name, toolDef);
                    }
                },
                configurable: true
            });

            if (!toolkitInitialized) {
                await initToolkit(apiKey);
            }

            const delegateTool = window.registeredToolsMap.get("delegate_page_task");

            if (!delegateTool) {
                return alert("delegate_page_task is not registered!");
            }

            document.getElementById('runAgentBtn').disabled = true;
            mlog(`\n--- RUNNING TASK VIA OPENAI ---`, "info");
            mlog(`Executing task: "${task}"`, "info");

            try {
                const result = await delegateTool.execute({ task: task }, { client: mockClient });
                mlog(`Invocation Returned: ${JSON.stringify(result, null, 2)}`, "success");
            } catch (e) {
                mlog(`Invocation failed: ${e.message}`, "error");
            }

            document.getElementById('runAgentBtn').disabled = false;
        });

        document.getElementById('checkoutForm').addEventListener('submit', e => { e.preventDefault(); alert("Form submitted!"); })
    </script>
</body>

</html>
